<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محاسبه‌گر ریال</title>
<style>
body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
.box { background: white; max-width: 350px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 18px; box-sizing: border-box; }
button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
#resultArea { margin-top: 20px; padding: 15px; background: #ffffcc; border: 1px solid #e6e600; font-size: 20px; font-weight: bold; }
</style>
</head>
<body>
‌
<div class="box">
<h3>محاسبه  تمبر و حق الوکاله</h3>
‌
<div style="text-align:right">مبلغ تمبر (ریال):</div>
<input type="number" id="inp" placeholder="مثلاً 500000">
‌
<div style="text-align:right">نوع پرونده:</div>
<select id="sel">
<option value="1">دادخواست بدوی</option>
<option value="1">دادخواست صلح حقوقی</option>
<option value="1">لوایح</option>
<option value="2">تجدیدنظرخواهی</option>
<option value="2">فرجامخواهی</option>
<option value="2">اعاده دادرسی</option>
<option value="3">دادخواست تقابل</option>
<option value="3">دادخواست جلب ثالث</option>
<option value="3">دادخواست ورود ثالث</option>
</select>
‌
<button onclick="
var v = document.getElementById('inp').value;
var s = document.getElementById('sel').value;
var res = 0;
if(v > 0) {
if(s == '1') res = v / 0.05 / 0.6;
if(s == '2') res = v / 0.05 / 0.4;
if(s == '3') res = v / 0.05;
document.getElementById('out').innerHTML = Math.round(res).toLocaleString('en-US');
} else {
alert('لطفاً عدد وارد کنید');
}
">محاسبه کن</button>
‌
<div id="resultArea">
خروجی: <span id="out">0</span> ریال
</div>
</div>
‌
</body>
</html>
